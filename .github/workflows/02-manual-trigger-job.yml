name: Manually trigger an Azure Machine Learning job

on:
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo
      uses: actions/checkout@v3   # use @v3 instead of @main

    - name: Install Azure ML CLI extension
      run: |
        az extension add -n ml -y || az extension update -n ml

    - name: Azure login
      uses: azure/login@v1
      with:
        enable-AzPSSession: true     # Required if using Managed Identity
        # creds not needed if using Managed Identity on Azure VM

    - name: Submit Azure ML job
      run: |
        az ml job create --file model/commandJob.yml
