name: Manually trigger an Azure Machine Learning job

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repo
      uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: 864c0eef-74c7-45cf-85c8-9af66590c95f
        tenant-id: 42aba817-505a-4c6c-aad4-6c5144559203
        subscription-id: d199375b-0629-4ba1-813e-a4c4d508ce2c

    - name: Install Azure ML CLI extension
      run: |
        az extension add -n ml -y || az extension update -n ml

    - name: Submit Azure ML job
      run: |
        az ml job create --file src/job.yml \
        --resource-group hj7 \
        --workspace-name Harsh \
        --stream
